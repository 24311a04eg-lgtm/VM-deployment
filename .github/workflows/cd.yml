name: Rolling Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      # Download artifact from CI
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      ####################################################
      # Deploy VM1
      ####################################################

      - name: Copy app.zip to VM1
        run: |
          scp -o StrictHostKeyChecking=no \
          app.zip \
          ${{ secrets.EC2_USER }}@${{ secrets.VM1_HOST }}:/opt/flask-app/

      - name: Deploy VM1
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.VM1_HOST }} << 'EOF'

            cd /opt/flask-app

            unzip -o app.zip

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install -r requirements.txt

            pkill -f "python3 app.py" || true

            nohup python3 app.py > app.log 2>&1 &

          EOF

      - name: Health Check VM1
        run: |
          sleep 5
          curl http://${{ secrets.VM1_HOST }}:5000/health

      ####################################################
      # Deploy VM2
      ####################################################

      - name: Copy app.zip to VM2
        run: |
          scp -o StrictHostKeyChecking=no \
          app.zip \
          ${{ secrets.EC2_USER }}@${{ secrets.VM2_HOST }}:/opt/flask-app/

      - name: Deploy VM2
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.VM2_HOST }} << 'EOF'

            cd /opt/flask-app

            unzip -o app.zip

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install -r requirements.txt

            pkill -f "python3 app.py" || true

            nohup python3 app.py > app.log 2>&1 &

          EOF

      - name: Health Check VM2
        run: |
          sleep 5
          curl http://${{ secrets.VM2_HOST }}:5000/health
