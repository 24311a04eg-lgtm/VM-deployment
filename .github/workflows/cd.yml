name: Rolling Deployment

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      # Download artifact from CI
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-app
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}


      # Setup SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}


      ####################################################
      # VM1 Deployment
      ####################################################

      - name: Copy artifact to VM1
        run: |
          scp -o StrictHostKeyChecking=no \
          app.zip \
          ${{ secrets.EC2_USER }}@${{ secrets.VM1_HOST }}:/opt/flask-app/


      - name: Deploy VM1
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.VM1_HOST }} << 'EOF'

            set -e

            cd /opt/flask-app

            sudo apt update
            sudo apt install -y python3.14-venv python3-pip unzip

            unzip -o app.zip

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            python -m pip install --upgrade pip

            pip install -r requirements.txt

            pkill -f "python app.py" || true

            nohup python app.py > app.log 2>&1 &

          EOF


      - name: Health Check VM1
        run: |
          for i in {1..12}; do
            if curl -f http://${{ secrets.VM1_HOST }}:5000/health; then
              echo "VM1 healthy"
              exit 0
            fi

            echo "Waiting for VM1..."
            sleep 5
          done

          echo "VM1 failed health check"
          exit 1



      ####################################################
      # VM2 Deployment
      ####################################################

      - name: Copy artifact to VM2
        run: |
          scp -o StrictHostKeyChecking=no \
          app.zip \
          ${{ secrets.EC2_USER }}@${{ secrets.VM2_HOST }}:/opt/flask-app/


      - name: Deploy VM2
        run: |
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.EC2_USER }}@${{ secrets.VM2_HOST }} << 'EOF'

            set -e

            cd /opt/flask-app

            sudo apt update
            sudo apt install -y python3.14-venv python3-pip unzip

            unzip -o app.zip

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            python -m pip install --upgrade pip

            pip install -r requirements.txt

            pkill -f "python app.py" || true

            nohup python app.py > app.log 2>&1 &

          EOF


      - name: Health Check VM2
        run: |
          for i in {1..12}; do
            if curl -f http://${{ secrets.VM2_HOST }}:5000/health; then
              echo "VM2 healthy"
              exit 0
            fi

            echo "Waiting for VM2..."
            sleep 5
          done

          echo "VM2 failed health check"
          exit 1
